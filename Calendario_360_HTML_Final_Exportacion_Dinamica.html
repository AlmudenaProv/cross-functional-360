<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendario 360 · Provalliance</title>
<style>
:root{
  --bg:#f4f1ec;--panel:#fff;--ink:#171a21;--muted:#747984;--line:#e7e1d9;
  --soft:#faf8f5;--dark:#151820;--shadow:0 16px 42px rgba(38,30,22,.07);
  --health-bg:#e3eee7;--health:#456b55;
  --color-bg:#ece7f4;--color:#665a86;
  --xmas-bg:#f1e3e7;--xmas:#7f3144;
  --launch-bg:#f3eadb;--launch:#80623d;
  --neutral-bg:#efede9;--neutral:#6f6a64;
  --complete-bg:#e5f1e8;--complete:#27603a;
  --notdone-bg:#f3e2e2;--notdone:#844444;
  --postponed-bg:#f4ead7;--postponed:#805c20;
  --progress-bg:#e8edf4;--progress:#49627b;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(145deg,#fbfaf8,#f2eee8);font-family:Inter,"Public Sans",Arial,sans-serif;color:var(--ink)}
.shell{display:grid;grid-template-columns:230px minmax(0,1fr);min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:rgba(255,255,255,.95);border-right:1px solid var(--line);padding:28px 18px}
.logo{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#877e73;font-weight:800}
.title{font-size:25px;font-weight:800;line-height:1.05;margin:10px 0 28px}
.tabs{display:grid;gap:7px}
.tab{border:0;background:transparent;padding:12px 13px;border-radius:13px;text-align:left;font-weight:720;color:#4b505a;cursor:pointer}
.tab:hover{background:#f3efe9}.tab.active{background:var(--dark);color:#fff}
.main{padding:30px 36px 55px;max-width:1650px;width:100%;margin:auto;min-width:0}
.top{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:18px}
.top h1{margin:0;font-size:30px}.top p{margin:6px 0 0;color:var(--muted);font-size:13px}
.month-filter{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:5px}
.month-btn{border:0;background:transparent;border-radius:10px;padding:9px 13px;font-size:12px;font-weight:750;cursor:pointer;color:#646a74}
.month-btn.active{background:var(--dark);color:#fff}

/* Resumen */
.overview{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:16px;margin-bottom:20px}
.overview-title{font-size:11px;text-transform:uppercase;letter-spacing:.13em;font-weight:850;color:#716b63;margin:2px 4px 12px}
.overview-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.overview-month{border:1px solid var(--line);border-radius:17px;padding:13px;background:#fcfbf9;cursor:pointer;transition:.18s}
.overview-month:hover{transform:translateY(-1px)}.overview-month.active{border-color:#1b1e25;box-shadow:inset 0 0 0 1px #1b1e25}
.ov-head{display:flex;justify-content:space-between;gap:8px;margin-bottom:10px}.ov-name{font-size:14px;font-weight:820}
.ov-total{font-size:10px;color:#777;background:#efede9;padding:4px 7px;border-radius:999px}
.ov-focuses{display:flex;gap:6px;flex-wrap:wrap;min-height:31px}
.focus-pill{font-size:10px;font-weight:780;padding:6px 8px;border-radius:999px;border:1px solid rgba(0,0,0,.025)}
.family-health{background:var(--health-bg);color:var(--health)}
.family-color{background:var(--color-bg);color:var(--color)}
.family-xmas{background:var(--xmas-bg);color:var(--xmas)}
.family-launch{background:var(--launch-bg);color:var(--launch)}
.family-neutral{background:var(--neutral-bg);color:var(--neutral)}
.ov-channels{display:flex;gap:4px;flex-wrap:wrap;margin-top:9px}
.ov-pill{font-size:9px;font-weight:760;padding:4px 6px;border-radius:999px;background:#f0efed;color:#676b72}

/* Mes */
.month-card{background:#fff;border:1px solid var(--line);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px}
.month-head{display:flex;justify-content:space-between;align-items:center;padding:19px 22px;border-bottom:1px solid var(--line)}
.month-name{font-size:20px;font-weight:820}.month-count{font-size:11px;color:#767c86;background:#f3f1ee;border-radius:999px;padding:6px 9px}
.context{padding:16px 20px;background:var(--soft);border-bottom:1px solid var(--line);display:grid;gap:10px}
.context-row{display:grid;grid-template-columns:145px 1fr;gap:12px}
.context-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:850;color:#858078;padding-top:4px}
.context-values{display:flex;gap:7px;flex-wrap:wrap}.empty-chip{font-size:12px;color:#9a9ea6;padding:5px 0}
.context-chip{border-radius:999px;padding:7px 11px;font-size:12px;font-weight:720}

.key-strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);background:#fff}
.key-box{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:#fcfbf9}
.key-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:850;color:#7d786f;margin-bottom:7px}
.key-items{display:flex;gap:6px;flex-wrap:wrap}.key-item{font-size:11px;font-weight:650;background:#f0eee9;border-radius:999px;padding:5px 8px}
.key-empty{font-size:11px;color:#9a9ea6}

/* Tabla 360 */
.table-wrap{padding:16px;overflow-x:auto}
.plan-table{width:100%;border-collapse:separate;border-spacing:0;min-width:1240px;border:1px solid var(--line);border-radius:17px;overflow:hidden}
.plan-table th{background:#f7f5f2;border-bottom:1px solid var(--line);padding:11px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#747982}
.plan-table td{border-bottom:1px solid #eee9e2;padding:10px;vertical-align:middle;font-size:11px}
.plan-table tr:last-child td{border-bottom:0}
.category-row td{background:#eeece8;padding:11px 13px;font-size:11px;font-weight:850;letter-spacing:.06em;text-transform:uppercase;color:#55514b}
.plan-cell{min-width:330px}
.plan-title{font-size:11px;font-weight:760;line-height:1.35}
.plan-type{font-weight:850;color:#40454e}
.plan-action{font-weight:650;color:#252932}
.plan-date{width:105px;color:#777d85;font-size:10px}
.owner-cell{width:145px}
.owner-pill{display:inline-block;padding:6px 8px;border-radius:999px;background:#f0efed;color:#5f646c;font-size:10px;font-weight:760}
.week-col{width:60px;text-align:center!important}
.week-cell{text-align:center;padding:7px!important;background:#fff}
.week-slot{height:24px;border-radius:7px;background:#f3f1ee;position:relative}
.week-slot.active.family-health{background:var(--health-bg);color:var(--health)}
.week-slot.active.family-color{background:var(--color-bg);color:var(--color)}
.week-slot.active.family-xmas{background:var(--xmas-bg);color:var(--xmas)}
.week-slot.active.family-launch{background:var(--launch-bg);color:var(--launch)}
.week-slot.active.family-neutral{background:#e7e4df;color:#8c867f}
.week-slot.active:after{content:"";position:absolute;left:50%;top:50%;width:7px;height:7px;border-radius:50%;background:currentColor;transform:translate(-50%,-50%)}
.family-marker{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:1px}
.marker-health{background:var(--health)}.marker-color{background:var(--color)}.marker-xmas{background:var(--xmas)}.marker-launch{background:var(--launch)}.marker-neutral{background:#a8a29b}
.status-cell{width:145px}
.status{width:100%;border:1px solid var(--line);border-radius:999px;padding:7px 9px;background:#f4f2ef;font-size:11px;font-weight:720}
.status[data-status="Completado"]{background:var(--complete-bg);color:var(--complete)}
.status[data-status="En curso"]{background:var(--progress-bg);color:var(--progress)}
.status[data-status="No realizado"]{background:var(--notdone-bg);color:var(--notdone)}
.status[data-status="Postpuesto"]{background:var(--postponed-bg);color:var(--postponed)}
.empty-row td{color:#9ca0a6;font-style:italic;background:#fcfbf9}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 16px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#696f77}.legend-dot{width:8px;height:8px;border-radius:50%}


.edit-toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:0 16px 16px}
.edit-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-size:10px;font-weight:760;color:#555b64;cursor:pointer}
.edit-btn:hover{background:#f5f2ed}
.editable{outline:none;border-radius:6px;transition:.15s}
.editable:hover{background:#f4f1ec}
.editable:focus{background:#fff7df;box-shadow:0 0 0 2px rgba(128,98,61,.14)}
.action-controls{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}
.icon-btn{border:0;background:transparent;color:#8d9299;font-size:11px;cursor:pointer;padding:2px 4px}
.icon-btn:hover{color:#222}
.add-row td{background:#fbfaf8;text-align:center}
.add-row button{border:1px dashed #cfc8bf;background:#fff;border-radius:10px;padding:8px 12px;font-size:10px;font-weight:750;color:#676c74;cursor:pointer}
.add-row button:hover{background:#f6f3ee}
.edit-hint{font-size:10px;color:#858a92;margin-top:8px}


.view-switch{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:5px}
.view-btn{border:0;background:transparent;border-radius:10px;padding:9px 12px;font-size:11px;font-weight:760;color:#666b73;cursor:pointer}
.view-btn.active{background:var(--dark);color:#fff}
.category-row{cursor:pointer}
.category-row:hover td{background:#e8e5df}
.category-toggle{display:inline-block;width:16px;color:#7b7771;font-size:10px}
.category-count{float:right;font-size:9px;background:#fff;border:1px solid #d9d3ca;border-radius:999px;padding:3px 7px;color:#777}
.category-hidden{display:none}


.exec-dashboard{display:grid;gap:14px;padding:16px;background:#fbfaf8}
.exec-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.exec-kpi{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px}
.exec-kpi-value{font-size:20px;font-weight:850}
.exec-kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#7c8189;margin-top:4px}
.exec-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
.exec-card{background:#fff;border:1px solid var(--line);border-radius:17px;padding:14px}
.exec-card-title{font-size:11px;font-weight:850;margin-bottom:4px}
.exec-card-sub{font-size:9px;color:#858a92;margin-bottom:12px}
.coverage-list{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.coverage-item{display:flex;align-items:center;gap:7px;background:#f7f5f2;border-radius:10px;padding:8px;font-size:10px;font-weight:720}
.coverage-dot{width:8px;height:8px;border-radius:50%;background:#d3d2cf}
.coverage-dot.on{background:#397558}
.exec-week-bars{display:flex;align-items:end;gap:9px;height:72px;padding-top:8px}
.exec-week{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px}
.exec-bar{width:70%;max-width:34px;min-height:3px;border-radius:5px 5px 1px 1px;background:#242a32}
.exec-week-label{font-size:9px;color:#7c8189}
.exec-actions{display:grid;gap:7px}
.exec-action{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:9px 0;border-bottom:1px solid #eee9e2}
.exec-action:last-child{border-bottom:0}
.exec-action-title{font-size:10px;font-weight:740;line-height:1.35}
.exec-action-meta{font-size:9px;color:#858a92;margin-top:3px}
.exec-status{font-size:9px;font-weight:780;padding:5px 7px;border-radius:999px;background:#f0efed;align-self:start}
.exec-status.done{background:var(--complete-bg);color:var(--complete)}
.exec-status.progress{background:var(--progress-bg);color:var(--progress)}
.exec-status.postponed{background:var(--postponed-bg);color:var(--postponed)}
.exec-status.notdone{background:var(--notdone-bg);color:var(--notdone)}
.week-slot{cursor:pointer}
.week-slot:hover{box-shadow:inset 0 0 0 1px #807a72}
.week-help{font-size:9px;color:#858a92;padding:0 16px 12px}
@media(max-width:950px){.exec-kpis{grid-template-columns:repeat(2,1fr)}.exec-grid{grid-template-columns:1fr}}


.annual-dashboard{display:grid;gap:16px}
.annual-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.annual-kpi{background:#fff;border:1px solid var(--line);border-radius:17px;padding:15px;box-shadow:var(--shadow)}
.annual-kpi-value{font-size:23px;font-weight:850}
.annual-kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#7d828a;margin-top:4px}
.annual-months{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.annual-month{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:var(--shadow)}
.annual-month-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.annual-month-name{font-size:15px;font-weight:830}
.annual-month-count{font-size:9px;color:#777;background:#f0eee9;padding:4px 7px;border-radius:999px}
.annual-focuses{display:flex;gap:5px;flex-wrap:wrap;min-height:34px;margin-bottom:12px}
.annual-coverage{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}
.annual-cover{display:flex;align-items:center;gap:6px;font-size:9px;color:#666b73}
.annual-cover-dot{width:7px;height:7px;border-radius:50%;background:#d6d5d2}
.annual-cover-dot.on{background:#397558}
.annual-load{display:flex;align-items:end;gap:5px;height:42px;margin-top:10px}
.annual-load-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}
.annual-load-bar{width:75%;max-width:24px;background:#242a32;border-radius:4px 4px 1px 1px;min-height:3px}
.annual-load-label{font-size:8px;color:#858a92}
.annual-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}
.annual-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow)}
.annual-card-title{font-size:11px;font-weight:850;margin-bottom:4px}
.annual-card-sub{font-size:9px;color:#858a92;margin-bottom:12px}
.annual-list{display:grid;gap:8px}
.annual-row{display:grid;grid-template-columns:110px minmax(0,1fr) auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid #eee9e2}
.annual-row:last-child{border-bottom:0}
.annual-row-month{font-size:10px;font-weight:780}
.annual-row-text{font-size:10px;line-height:1.35}
.annual-row-meta{font-size:9px;color:#7f848c}
@media(max-width:1200px){.annual-months{grid-template-columns:repeat(2,1fr)}.annual-grid{grid-template-columns:1fr}}
@media(max-width:700px){.annual-kpis,.annual-months{grid-template-columns:1fr}}


.search-box{position:relative;min-width:320px}
.search-input{width:100%;height:42px;border:1px solid var(--line);border-radius:13px;background:#fff;padding:0 38px 0 13px;font-size:12px;outline:none}
.search-input:focus{box-shadow:0 0 0 3px rgba(23,26,33,.08)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);border:0;background:transparent;color:#8a8f96;cursor:pointer;font-size:16px}
.search-results-note{font-size:10px;color:#858a92;margin-top:8px}
.exec-flag{display:inline-flex;align-items:center;gap:6px;font-size:9px;color:#6d727a;margin-top:7px}
.exec-flag input{accent-color:#1f242c}
.coverage-control{display:flex;align-items:center;justify-content:space-between;gap:10px}
.coverage-control label{display:flex;align-items:center;gap:6px;font-size:9px;color:#6d727a}
.coverage-control input{accent-color:#1f242c}
.filtered-out{display:none!important}
@media(max-width:700px){.search-box{min-width:100%;width:100%}}


.search-controls{display:flex;gap:7px;align-items:center}
.search-button{height:42px;border:0;border-radius:12px;background:var(--dark);color:#fff;padding:0 14px;font-size:11px;font-weight:760;cursor:pointer}
.search-button:hover{opacity:.9}
.search-count{font-size:10px;color:#858a92;margin-top:6px}

.no-results{background:#fff;border:1px solid var(--line);border-radius:18px;padding:32px;text-align:center;color:#8a8f96;font-size:12px;box-shadow:var(--shadow)}
.export-btn{height:42px;border:1px solid var(--dark);border-radius:12px;background:var(--dark);padding:0 14px;font-size:11px;font-weight:760;color:#fff;cursor:pointer}.export-btn:hover{opacity:.92}

.import-btn{height:42px;border:1px solid var(--line);border-radius:12px;background:#171a21;color:#fff;padding:0 14px;font-size:11px;font-weight:760;cursor:pointer}
.import-btn:hover{opacity:.92}
.import-status{position:fixed;right:24px;bottom:24px;z-index:1000;max-width:360px;background:#171a21;color:#fff;border-radius:14px;padding:12px 14px;font-size:11px;line-height:1.45;box-shadow:0 14px 35px rgba(0,0,0,.2);display:none}
.import-status.error{background:#7e3030}

@media(max-width:1150px){.overview-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:900px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.tabs{display:flex;flex-wrap:wrap}.main{padding:24px 16px}}
@media(max-width:700px){.overview-grid{grid-template-columns:1fr}.top{flex-direction:column;align-items:stretch}.key-strip{grid-template-columns:1fr}.context-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="logo">Provalliance</div>
  <div class="title">Calendario<br>360</div>
  <div class="tabs" id="tabs"></div>
</aside>
<main class="main" id="app"></main>
</div>

let state={brand:DATA.brands[0].id,month:'TODOS',view:'executive',collapsed:{},search:'',searchDraft:''};
const esc=s=>(s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function brand(){return DATA.brands.find(b=>b.id===state.brand)}
function setBrand(id){state.brand=id;state.month='TODOS';render()}
function setMonth(m){state.month=m;render();window.scrollTo({top:0,behavior:'smooth'})}
function setDisplayMode(mode){state.view=mode;render()}
function normalizeSearchText(value){
 return (value||'')
   .toString()
   .normalize('NFD')
   .replace(/[\u0300-\u036f]/g,'')
   .toLowerCase()
   .replace(/[^a-z0-9ñ\s]/g,' ')
   .replace(/\s+/g,' ')
   .trim();
}
function updateSearchDraft(value){state.searchDraft=value}
function applySearch(value){
 state.searchDraft=value!==undefined?value:state.searchDraft;
 state.search=normalizeSearchText(state.searchDraft);
 render();
}
function handleSearchKey(event,value){
 if(event.key==='Enter'){
   event.preventDefault();
   applySearch(value);
 }
}
function clearSearch(){
 state.search='';
 state.searchDraft='';
 render();
}
function searchTerms(){
 return state.search.split(' ').filter(Boolean);
}
function matchesSearch(...values){
 if(!state.search)return true;
 const haystack=normalizeSearchText(values.flat(Infinity).join(' '));
 return searchTerms().every(term=>haystack.indexOf(term)!==-1);
}
function monthMatchesSearch(month,data){
 if(!state.search)return true;
 const monthText=[
   DATA.labels[month],
   ...(data.focus||[]),
   ...(data.secondary||[]),
   ...(data.launches||[]),
   ...(data.commercial||[]).flatMap(x=>[x.week,x.action]),
   ...(data.cultural||[]).flatMap(x=>[x.week,x.action]),
   ...(data.items||[]).flatMap(i=>[
     i.channel,i.type,i.action,i.week,
     ...(Array.isArray(i.weeks)?i.weeks:[]),
     i.owner,i.status
   ])
 ];
 return matchesSearch(monthText);
}

function categoryKey(month,channel){return state.brand+'|'+month+'|'+channel}
function toggleCategory(month,channel){
 const key=categoryKey(month,channel);
 state.collapsed[key]=!state.collapsed[key];

}

function renderTabs(){document.getElementById('tabs').innerHTML=DATA.brands.map(b=>`<button class="tab ${b.id===state.brand?'active':''}" onclick="setBrand('${b.id}')">${esc(b.name)}</button>`).join('')}

function family(text){
 const s=(text||'').toLowerCase();
 if(/navidad|regala|regalo|black\s*friday|nochebuena|nochevieja/.test(s)) return 'xmas';
 if(/color|mecha|wella|barro/.test(s)) return 'color';
 if(/longevidad|antica[ií]da|antifrizz|tratamiento|salud capilar|post.?verano|b[oó]tox|hidrat|reparaci/.test(s)) return 'health';
 if(/lanzamiento|nuevo servicio|colecci[oó]n|novedad/.test(s)) return 'launch';
 return 'neutral';
}
function familyClass(text){return 'family-'+family(text)}
function storageKey(){return 'p360editable|'+state.brand}
function saveBrand(){localStorage.setItem(storageKey(),JSON.stringify(brand().months))}
function loadBrand(){
 const saved=localStorage.getItem(storageKey());
 if(saved){try{brand().months=JSON.parse(saved)}catch(e){}}
}
function saveAllBrands(){
 DATA.brands.forEach(b=>{
   const saved=localStorage.getItem('p360editable|'+b.id);
   if(saved){try{b.months=JSON.parse(saved)}catch(e){}}
 });
}
saveAllBrands();

}

}
function contextRow(month,label,key,values){

}
function overview(b,m){
 const d=b.months[m]||{focus:[],items:[],counts:{}};
 const counts={};(d.items||[]).forEach(x=>counts[x.channel]=(counts[x.channel]||0)+1);

   <div class="ov-channels">${top.map(([c,n])=>`<span class="ov-pill">${esc(c)} · ${n}</span>`).join('')}</div>

}

function updateMoment(month,key,index,text){
 const parts=text.split('·');const d=brand().months[month][key][index];
 if(parts.length>1){d.week=parts.shift().trim();d.action=parts.join('·').trim()}else{d.action=text.trim()}

}

function deleteMoment(month,key,index){brand().months[month][key].splice(index,1);saveBrand();render()}

function areaFor(channel){
 if(channel==='PR Comunicación + Influencers') return 'Comunicación';
 if(channel==='Activos digitales') return 'Digital';
 if(channel==='CRM'||channel==='Loyalty') return 'CRM';
 if(channel==='PDV') return 'Trade Marketing';
 if(channel==='Formación') return 'Formación';
 if(channel==='Promotion') return 'Trade Marketing';
 return 'Marketing';
}
function statusKey(m,item,index){return `p360tabla|${state.brand}|${m}|${item.channel}|${item.type}|${index}|${item.action}`}
function monthWeeks(d){
 const weeks=[];
 (d.items||[]).forEach(i=>{
   const selected=Array.isArray(i.weeks)?i.weeks:(i.week?[i.week]:[]);
   selected.forEach(w=>{if(w&&!weeks.includes(w))weeks.push(w)});
 });
 (d.commercial||[]).forEach(i=>{if(i.week&&!weeks.includes(i.week))weeks.push(i.week)});
 (d.cultural||[]).forEach(i=>{if(i.week&&!weeks.includes(i.week))weeks.push(i.week)});
 const slotOrder=['S1','S2','S3','S4','S5'];
 weeks.sort((a,b)=>{
   const ai=slotOrder.indexOf(a),bi=slotOrder.indexOf(b);
   if(ai>=0||bi>=0)return (ai<0?99:ai)-(bi<0?99:bi);
   return 0;
 });
 return weeks;
}

function toggleExecutiveAction(month,index,checked){
 const item=brand().months[month].items[index];
 item.showExecutive=checked;
 saveBrand();render();
}
function coveragePreference(month,channel){
 const d=brand().months[month];
 d.coveragePreferences=d.coveragePreferences||{};
 return d.coveragePreferences[channel]!==false;
}
function toggleCoveragePreference(month,channel,checked){
 const d=brand().months[month];
 d.coveragePreferences=d.coveragePreferences||{};
 d.coveragePreferences[channel]=checked;
 saveBrand();render();
}

function editItem(month,index,field,value){
 const item=brand().months[month].items[index];
 item[field]=value.trim();
 saveBrand();render();
}
function changeWeek(month,index,value){
 const item=brand().months[month].items[index];
 item.week=value;
 if(!item.weeks||!item.weeks.length)item.weeks=value?[value]:[];
 saveBrand();render();
}
function itemWeeks(item){
 if(Array.isArray(item.weeks))return item.weeks;
 return item.week?[item.week]:[];
}
function toggleItemWeek(month,index,week){
 const item=brand().months[month].items[index];
 const weeks=itemWeeks(item);
 const pos=weeks.indexOf(week);
 if(pos>=0)weeks.splice(pos,1);else weeks.push(week);
 item.weeks=weeks;
 item.week=weeks.join(' · ');
 saveBrand();render();
}
function changeOwner(month,index,value){brand().months[month].items[index].owner=value;saveBrand()}
function changeStatus(month,index,value){brand().months[month].items[index].status=value;saveBrand()}
function deleteItem(month,index){brand().months[month].items.splice(index,1);saveBrand();render()}
function addItem(month,channel){
 const type=prompt('Tipo de acción (por ejemplo, Activación influencer, Newsletter, Pantallas):')||'';
 const action=prompt('Acción planificada:')||'';
 const week=prompt('Semana o fecha:','Semana 1-6')||'';
 const owner=prompt('Área responsable:',areaFor(channel))||areaFor(channel);
 if(action.trim()){
   brand().months[month].items.push({channel,type:type.trim()||'Acción',action:action.trim(),week:week.trim(),weeks:week.trim()?[week.trim()]:[],owner:owner.trim(),status:''});
   saveBrand();render();
 }
}
function addCategory(month){
 const channel=prompt('Nombre de la nueva categoría:')||'';
 if(!channel.trim())return;
 if(!DATA.structure.some(x=>x[0]===channel.trim()))DATA.structure.push([channel.trim(),[]]);
 addItem(month,channel.trim());
}
function editCategory(oldName){
 const value=prompt('Nuevo nombre de categoría:',oldName);
 if(!value||!value.trim()||value.trim()===oldName)return;
 DATA.structure.forEach(x=>{if(x[0]===oldName)x[0]=value.trim()});
 DATA.brands.forEach(b=>Object.values(b.months).forEach(d=>(d.items||[]).forEach(i=>{if(i.channel===oldName)i.channel=value.trim()})));
 saveBrand();render();
}
function planTable(m,d){
 const weeks=monthWeeks(d);
 const knownChannels=DATA.structure.map(x=>x[0]);
 const extraChannels=[...new Set((d.items||[]).map(i=>i.channel).filter(c=>!knownChannels.includes(c)))];
 const allChannels=[...knownChannels,...extraChannels];
 const channels=state.view==='executive'
   ? allChannels.filter(channel=>(d.items||[]).some(i=>i.channel===channel))
   : allChannels;

 const rows=[];
 channels.forEach(channel=>{
   const matches=(d.items||[]).map((item,index)=>({item,index}))
     .filter(x=>x.item.channel===channel)
     .filter(x=>matchesSearch(x.item.channel,x.item.type,x.item.action,x.item.week,x.item.owner,x.item.status,(d.focus||[]).join(' '),(d.secondary||[]).join(' '),(d.launches||[]).join(' ')));
   const channelMatches = matches.length>0 || matchesSearch(channel);
   if(state.search && !channelMatches)return;

   const collapsed=!!state.collapsed[categoryKey(m,channel)];
   rows.push({category:true,channel,count:matches.length,collapsed});
   if(!collapsed){
     if(matches.length)matches.forEach(x=>rows.push(x));
     else if(!state.search)rows.push({empty:true,item:{channel,type:'',week:'',action:'Sin acciones planificadas'},index:-1});
     if(!state.search)rows.push({add:true,channel});
   }
 });

 const weekHeads=weeks.map((w,i)=>`<th class="week-col">S${i+1}<br><span style="font-size:8px;text-transform:none;letter-spacing:0">${esc(w.replace('Semana ',''))}</span></th>`).join('');
 const colspan=5+weeks.length;

 const body=rows.map(row=>{
   if(row.category){
     const pref=coveragePreference(m,row.channel);
     return `<tr class="category-row" onclick="toggleCategory('${m}','${row.channel.replace(/'/g,"\\'")}')">
       <td colspan="${colspan}">
         <span class="category-toggle">${row.collapsed?'▶':'▼'}</span>
         <span class="editable" contenteditable="true" onclick="event.stopPropagation()" onblur="editCategory('${row.channel.replace(/'/g,"\\'")}')">${esc(row.channel)}</span>
         <span class="category-count">${row.count} ${row.count===1?'acción':'acciones'}</span>
         <span class="coverage-control" style="float:right;margin-right:10px" onclick="event.stopPropagation()">
           <label><input type="checkbox" ${pref?'checked':''} onchange="toggleCoveragePreference('${m}','${row.channel.replace(/'/g,"\\'")}',this.checked)"> Mostrar como hueco si está vacío</label>
         </span>
       </td>
     </tr>`;
   }
   if(row.add){
     return `<tr class="add-row"><td colspan="${colspan}"><button onclick="addItem('${m}','${row.channel.replace(/'/g,"\\'")}')">+ Añadir acción en ${esc(row.channel)}</button></td></tr>`;
   }
   const {item,index,empty}=row;
   const f=family(item.action+' '+item.type);
   const owner=item.owner||areaFor(item.channel);
   const status=item.status||'';
   return `<tr class="${empty?'empty-row':''}">
     <td class="plan-cell"><div class="plan-title"><span class="family-marker marker-${f}"></span>${empty?esc(item.action):`<span class="plan-type editable" contenteditable="true" onblur="editItem('${m}',${index},'type',this.innerText)">${esc(item.type)}</span> · <span class="plan-action editable" contenteditable="true" onblur="editItem('${m}',${index},'action',this.innerText)">${esc(item.action)}</span>`}</div>${!empty?`<div class="action-controls"><button class="icon-btn" onclick="deleteItem('${m}',${index})">Eliminar</button></div><label class="exec-flag"><input type="checkbox" ${item.showExecutive?'checked':''} onchange="toggleExecutiveAction('${m}',${index},this.checked)"> Mostrar en Principales acciones</label>`:''}</td>
     <td class="plan-date">${empty?'—':`<input value="${esc(item.week)}" onchange="changeWeek('${m}',${index},this.value)" style="width:100%;border:1px solid var(--line);border-radius:8px;padding:6px;font-size:10px">`}</td>
     ${weeks.map(w=>`<td class="week-cell"><div title="Haz clic para marcar o desmarcar esta semana" onclick="toggleItemWeek('${m}',${index},'${w.replace(/'/g,"\\'")}')" class="week-slot ${itemWeeks(item).includes(w)?'active family-'+f:''}"></div></td>`).join('')}
     <td class="owner-cell">${empty?'—':`<input value="${esc(owner)}" onchange="changeOwner('${m}',${index},this.value)" style="width:100%;border:1px solid var(--line);border-radius:999px;padding:7px 9px;font-size:10px;font-weight:700;background:#f0efed">`}</td>
     <td class="status-cell">${empty?'—':`<select class="status" data-status="${status}" onchange="this.dataset.status=this.value;changeStatus('${m}',${index},this.value)"><option value="">Estado</option><option ${status==='Completado'?'selected':''}>Completado</option><option ${status==='En curso'?'selected':''}>En curso</option><option ${status==='No realizado'?'selected':''}>No realizado</option><option ${status==='Postpuesto'?'selected':''}>Postpuesto</option></select>`}</td>
   </tr>`;
 }).join('');

 const emptyMessage = rows.length===0
   ? `<div style="padding:28px;text-align:center;color:#92969d;font-size:12px">No hay resultados para esta búsqueda.</div>`
   : '';

 return `${emptyMessage}<div class="table-wrap"><table class="plan-table"><thead><tr><th>Planificación</th><th>Fecha</th>${weekHeads}<th>Área responsable</th><th>Estado</th></tr></thead><tbody>${body}</tbody></table></div>
 <div class="week-help">Haz clic en las casillas de S1, S2, S3… para marcar tantas semanas como necesite cada acción.</div><div class="edit-toolbar"><button class="edit-btn" onclick="addCategory('${m}')">+ Añadir categoría</button><span class="edit-hint">Haz clic sobre cualquier texto para editarlo.</span></div>`;
}

function statusClass(status){
 if(status==='Completado')return 'done';
 if(status==='En curso')return 'progress';
 if(status==='Postpuesto')return 'postponed';
 if(status==='No realizado')return 'notdone';
 return '';
}
function executiveDashboard(m,d){
 const items=d.items||[];
 const categories=[...new Set(items.map(i=>i.channel))];
 const completed=items.filter(i=>i.status==='Completado').length;
 const active=items.filter(i=>i.status==='En curso').length;
 const pending=items.filter(i=>!i.status||i.status==='Postpuesto').length;
 const weeks=monthWeeks(d);
 const weekCounts=weeks.map(w=>items.filter(i=>itemWeeks(i).includes(w)).length);
 const max=Math.max(1,...weekCounts);
 const coverage=DATA.structure.map(x=>x[0]).map(c=>({name:c,on:items.some(i=>i.channel===c)}));
 const nextActions=[...items].sort((a,b)=>{
   const ai=weeks.findIndex(w=>itemWeeks(a).includes(w));
   const bi=weeks.findIndex(w=>itemWeeks(b).includes(w));
   return (ai<0?99:ai)-(bi<0?99:bi);
 }).slice(0,8);

 return `<div class="exec-dashboard">
   <div class="exec-kpis">
     <div class="exec-kpi"><div class="exec-kpi-value">${items.length}</div><div class="exec-kpi-label">Acciones planificadas</div></div>

   </div>
   <div class="exec-grid">
     <section class="exec-card">
       <div class="exec-card-title">Cobertura del mes</div>

     </section>
     <section class="exec-card">
       <div class="exec-card-title">Carga por semana</div>
       <div class="exec-card-sub">Permite detectar rápidamente semanas con mayor concentración.</div>
       <div class="exec-week-bars">${weeks.length?weeks.map((w,i)=>`<div class="exec-week"><div class="exec-bar" style="height:${Math.max(3,Math.round(weekCounts[i]/max*48))}px"></div><div class="exec-week-label">S${i+1}</div></div>`).join(''):'<span class="key-empty">Sin semanas planificadas</span>'}</div>
     </section>

   </section>
 </div>`;
}


function annualExecutive(b){

 }));
 const visibleMonthData=allMonthData.filter(x=>monthMatchesSearch(x.month,x.data));
 const allItems=allMonthData.flatMap(x=>(x.data.items||[]).map(i=>({...i,month:x.month})));
 const visibleItems=allItems.filter(i=>matchesSearch(
   DATA.labels[i.month],i.action,i.type,i.channel,i.week,
   Array.isArray(i.weeks)?i.weeks.join(' '):'',
   i.owner,i.status,
   ...(b.months[i.month].focus||[]),
   ...(b.months[i.month].secondary||[]),
   ...(b.months[i.month].launches||[])
 ));
 const completed=visibleItems.filter(i=>i.status==='Completado').length;
 const channels=[...new Set(visibleItems.map(i=>i.channel))];
 const launches=visibleMonthData.reduce((s,x)=>s+(x.data.launches||[]).length,0);
 const core=DATA.structure.map(x=>x[0]);

   const monthItems=(data.items||[]).filter(i=>matchesSearch(
     DATA.labels[month],i.action,i.type,i.channel,i.week,
     Array.isArray(i.weeks)?i.weeks.join(' '):'',
     i.owner,i.status,
     ...(data.focus||[]),...(data.secondary||[]),...(data.launches||[])
   ));
   const weeks=monthWeeks(data);
   const weekCounts=weeks.map(w=>monthItems.filter(i=>itemWeeks(i).includes(w)).length);
   const maxWeek=Math.max(1,...weekCounts);
   return `<article class="annual-month">
     <div class="annual-month-title">

       <span class="annual-cover-dot ${monthItems.some(i=>i.channel===c)?'on':''}"></span>

     <div class="annual-load">${weeks.length
       ? weeks.map((w,i)=>`<div class="annual-load-col">
           <div class="annual-load-bar" style="height:${Math.max(3,Math.round((weekCounts[i]||0)/maxWeek*30))}px"></div>

         </div>`).join('')
       : '<span class="key-empty">Sin planificación semanal</span>'}</div>
   </article>`;
 }).join('');

 const selected=visibleItems.filter(i=>i.showExecutive);

 // One compact coverage row per month.
 const coverageRows=visibleMonthData.map(({month,data})=>{
   const missing=core.filter(c=>{
     const pref=(data.coveragePreferences||{})[c]!==false;
     return pref && !(data.items||[]).some(i=>i.channel===c);
   });
   return {month,missing};
 }).filter(x=>x.missing.length);

 if(state.search && visibleMonthData.length===0){
   return `<div class="no-results">No hay resultados para “${esc(state.searchDraft)}”.</div>`;
 }

 return `<section class="annual-dashboard">
   <div class="annual-kpis">
     <div class="annual-kpi"><div class="annual-kpi-value">${visibleItems.length}</div><div class="annual-kpi-label">Acciones visibles</div></div>
     <div class="annual-kpi"><div class="annual-kpi-value">${channels.length}</div><div class="annual-kpi-label">Canales visibles</div></div>

         ? selected.map(i=>`<div class="annual-row">

}

function splitValues(value){
 return (value||'').toString().split('|').map(x=>x.trim()).filter(Boolean);
}
function parseMomentValues(value){
 return splitValues(value).map(text=>{
   const match=text.match(/^(Semana\s+[^:]+):\s*(.+)$/i);
   return match?{week:match[1].trim(),action:match[2].trim()}:{week:'',action:text};
 });
}
function xmlText(node,selector){
 const found=node.querySelector(selector);
 return found?found.textContent:'';
}
function colIndex(ref){
 const letters=(ref.match(/[A-Z]+/i)||['A'])[0].toUpperCase();
 let n=0;
 for(const ch of letters)n=n*26+(ch.charCodeAt(0)-64);
 return n-1;
}
async function xlsxSheets(file){
 const zip=await JSZip.loadAsync(await file.arrayBuffer());
 const parser=new DOMParser();
 const shared=[];
 if(zip.file('xl/sharedStrings.xml')){
   const xml=parser.parseFromString(await zip.file('xl/sharedStrings.xml').async('string'),'application/xml');
   xml.querySelectorAll('si').forEach(si=>{
     shared.push(Array.from(si.querySelectorAll('t')).map(t=>t.textContent).join(''));
   });
 }
 const wbXml=parser.parseFromString(await zip.file('xl/workbook.xml').async('string'),'application/xml');
 const relXml=parser.parseFromString(await zip.file('xl/_rels/workbook.xml.rels').async('string'),'application/xml');
 const rels={};
 relXml.querySelectorAll('Relationship').forEach(r=>rels[r.getAttribute('Id')]=r.getAttribute('Target'));
 const sheets={};
 for(const sheet of wbXml.querySelectorAll('sheet')){
   const name=sheet.getAttribute('name');
   const rid=sheet.getAttribute('r:id')||sheet.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','id');
   let target=rels[rid]||'';
   if(target.startsWith('/'))target=target.slice(1);
   else target='xl/'+target.replace(/^\.\//,'');
   const fileRef=zip.file(target);
   if(!fileRef)continue;
   const xml=parser.parseFromString(await fileRef.async('string'),'application/xml');
   const rows=[];
   xml.querySelectorAll('sheetData row').forEach(rowNode=>{
     const r=(parseInt(rowNode.getAttribute('r')||'1',10)-1);
     rows[r]=rows[r]||[];
     rowNode.querySelectorAll('c').forEach(c=>{
       const idx=colIndex(c.getAttribute('r')||'A1');
       const type=c.getAttribute('t');
       let value='';
       if(type==='s'){
         value=shared[parseInt(xmlText(c,'v')||'0',10)]||'';
       }else if(type==='inlineStr'){
         value=Array.from(c.querySelectorAll('is t')).map(t=>t.textContent).join('');
       }else{
         value=xmlText(c,'v');
       }
       rows[r][idx]=value;
     });
   });
   sheets[name]=rows;
 }
 return sheets;
}
function monthKey(label){
 const normalized=(label||'').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();
 const map={SEPTIEMBRE:'SEPTIEMBRE',OCTUBRE:'OCTUBRE',NOVIEMBRE:'NOVIEMBRE',DICIEMBRE:'DICIEMBRE'};
 return map[normalized]||'';
}
function brandForSheet(name){
 const normalized=name.toLowerCase().replace(/[^a-z0-9]/g,'');
 return DATA.brands.find(b=>b.name.toLowerCase().replace(/[^a-z0-9]/g,'')===normalized)
   || DATA.brands.find(b=>normalized.includes(b.name.toLowerCase().replace(/[^a-z0-9]/g,'')))
   || (normalized==='ohmycut'?DATA.brands.find(b=>b.name==='Oh my Cut!'):null);
}
async function importMasterExcel(file){
 if(!file)return;
 try{
   showImportStatus('Importando Excel maestro…');
   const sheets=await xlsxSheets(file);
   let importedBrands=0;
   for(const [sheetName,rows] of Object.entries(sheets)){
     const b=brandForSheet(sheetName);
     if(!b)continue;
     const months={};
     DATA.months.forEach(m=>months[m]={focus:[],secondary:[],launches:[],commercial:[],cultural:[],items:[],coveragePreferences:{}});
     // Strategic summary rows 4–7 (indexes 3–6)
     for(let r=3;r<=6;r++){
       const row=rows[r]||[];
       const mk=monthKey(row[0]);
       if(!mk)continue;
       months[mk].focus=splitValues(row[1]);
       months[mk].secondary=splitValues(row[2]);
       months[mk].launches=splitValues(row[3]);
       months[mk].commercial=parseMomentValues(row[4]);
       months[mk].cultural=parseMomentValues(row[5]);
       const watched=splitValues(row[6]);
       DATA.structure.forEach(([channel])=>months[mk].coveragePreferences[channel]=watched.length?watched.includes(channel):true);
     }
     // Actions from row 11 onward (index 10)
     for(let r=10;r<rows.length;r++){
       const row=rows[r]||[];
       const mk=monthKey(row[1]);
       const action=(row[4]||'').toString().trim();
       if(!mk||!action)continue;
       const selected=[];
       for(let i=0;i<5;i++){
         if((row[5+i]||'').toString().trim().toLowerCase()==='sí'||(row[5+i]||'').toString().trim().toLowerCase()==='si')selected.push('S'+(i+1));
       }
       months[mk].items.push({
         channel:(row[2]||'').toString().trim(),
         type:(row[3]||'').toString().trim(),
         action,
         weeks:selected,
         week:(row[10]||selected.join(' · ')).toString().trim(),
         owner:(row[11]||'').toString().trim(),
         status:(row[12]||'').toString().trim(),
         showExecutive:(row[13]||'').toString().trim().toLowerCase()==='sí'||(row[13]||'').toString().trim().toLowerCase()==='si'
       });
     }
     b.months=months;
     localStorage.setItem('p360editable|'+b.id,JSON.stringify(months));
     importedBrands++;
   }
   if(!importedBrands)throw new Error('No se encontraron pestañas de marca compatibles.');
   state.month='TODOS';
   state.search='';
   state.searchDraft='';
   render();
   showImportStatus(`Excel importado correctamente: ${importedBrands} marcas actualizadas.`);
 }catch(error){
   console.error(error);
   showImportStatus('No se pudo importar el Excel. Utiliza el archivo maestro sin cambiar los nombres de las pestañas ni las columnas.',true);
 }
}

function excelEscape(value){
 return (value??'').toString()
   .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
   .replace(/"/g,'&quot;');
}
function exportExcel(){
 const rows=[];
 rows.push([
   'Marca','Mes','Categoría','Tipo de acción','Acción planificada',
   'Semanas','Fecha / periodo','Área responsable','Estado',
   'Mostrar en principales acciones','Mostrar hueco de cobertura',
   'Foco principal','Foco secundario','Lanzamiento',
   'Momentos comerciales / promocionales','Momentos culturales / fechas clave'
 ]);

 DATA.brands.forEach(b=>{
   DATA.months.forEach(month=>{
     const d=b.months[month]||{};
     const focus=(d.focus||[]).join(' | ');
     const secondary=(d.secondary||[]).join(' | ');
     const launches=(d.launches||[]).join(' | ');
     const commercial=(d.commercial||[])
       .map(x=>`${x.week?x.week+': ':''}${x.action||''}`)
       .join(' | ');
     const cultural=(d.cultural||[])
       .map(x=>`${x.week?x.week+': ':''}${x.action||''}`)
       .join(' | ');

     const items=d.items||[];

     if(items.length){
       items.forEach(item=>{
         const pref=(d.coveragePreferences||{})[item.channel]!==false;
         rows.push([
           b.name,
           DATA.labels[month],
           item.channel||'',
           item.type||'',
           item.action||'',
           itemWeeks(item).join(' · '),
           item.week||'',
           item.owner||areaFor(item.channel),
           item.status||'',
           item.showExecutive?'Sí':'No',
           pref?'Sí':'No',
           focus,
           secondary,
           launches,
           commercial,
           cultural
         ]);
       });
     }else{
       rows.push([
         b.name,
         DATA.labels[month],
         '',
         '',
         '',
         '',
         '',
         '',
         '',
         'No',
         'Sí',
         focus,
         secondary,
         launches,
         commercial,
         cultural
       ]);
     }
   });
 });

 const table=rows.map((row,i)=>
   '<tr>'+row.map(v=>`<${i===0?'th':'td'}>${excelEscape(v)}</${i===0?'th':'td'}>`).join('')+'</tr>'
 ).join('');

 const workbook=`<html xmlns:o="urn:schemas-microsoft-com:office:office"
 xmlns:x="urn:schemas-microsoft-com:office:excel">
 <head>
 <meta charset="UTF-8">
 <style>
 table{border-collapse:collapse;font-family:Arial;font-size:11px}
 th{background:#171A21;color:white;font-weight:bold}
 th,td{border:1px solid #D9D9D9;padding:6px;vertical-align:top}
 </style>
 </head>
 <body><table>${table}</table></body></html>`;

 const blob=new Blob([workbook],{type:'application/vnd.ms-excel;charset=utf-8;'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;
 a.download='Calendario_360_Exportacion_Completa.xls';
 document.body.appendChild(a);
 a.click();
 a.remove();
 URL.revokeObjectURL(url);
}
